<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, viewport-fit=cover" />

    <!-- SEO Básico: Bilíngue para captar tráfego global e local -->
    <title>Storely — Website Builder | Sem código, Sem limites</title>
    <meta name="title" content="Storely — Website Builder | Sem código, Sem limites" />
    <meta
      name="description"
      content="A plataforma definitiva para criar sites com performance extrema. Build fast, professional websites with no code. Storely: No code, no limits."
    />
    <meta name="keywords" content="website builder, no code, criar site, ecommerce, storely, performance, fast" />
    <meta name="author" content="Storely" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://storelyy.vercel.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#030303" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Storely" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook / LinkedIn (Bilíngue) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://storelyy.vercel.app/" />
    <meta property="og:title" content="Storely — Website Builder | Sem código, Sem limites" />
    <meta
      property="og:description"
      content="Crie sites profissionais em tempo real sem saber programar. Build professional websites in real-time with zero coding."
    />
    <meta property="og:image" content="https://storelyy.vercel.app/social-preview.png" />
    <meta property="og:locale" content="pt_PT" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://storelyy.vercel.app/" />
    <meta name="twitter:title" content="Storely — Website Builder | Sem código, Sem limites" />
    <meta
      name="twitter:description"
      content="A plataforma definitiva para criar sites com performance extrema. No code, no limits."
    />
    <meta name="twitter:image" content="https://storelyy.vercel.app/social-preview.png" />

    <!-- Segurança -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <style>
      :root {
        --bg: #030303;
        --accent: #6366f1;
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        margin: 0;
        background: var(--bg);
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased;
      }

      body.is-loading {
        overflow: hidden !important;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 999999;
        transition: opacity 0.5s ease;
        contain: strict;
      }

      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateZ(0);
        backface-visibility: hidden;
      }

      .logo-box {
        position: relative;
        width: 220px;
        height: 220px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-box img {
        width: 195px;
        height: auto;
        display: block;
        image-rendering: -webkit-optimize-contrast;
        transform: translateZ(0);
      }

      .brand-text {
        margin-top: 24px;
      }

      .name {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        opacity: 0;
        transform: scale(0.95) translateZ(0);
        animation: textReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.4s;
        will-change: transform, opacity;
      }

      .loader-wrapper {
        margin-top: 40px;
        width: 120px;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }

      .loader-line {
        position: absolute;
        width: 100%;
        height: 100%;
        background: var(--accent);
        transform: translateX(-100%);
        animation: loading 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes textReveal {
        to {
          opacity: 1;
          transform: scale(1) translateZ(0);
        }
      }

      @keyframes loading {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .exit-active {
        opacity: 0 !important;
        pointer-events: none;
      }
    </style>
  </head>

  <body class="is-loading">
    <div id="app-splash" aria-hidden="true">
      <div class="splash-container">
        <div class="logo-box">
          <!-- Adicionado ?v=storely_1 para forçar o cache a não partilhar a imagem com outros projetos locais -->
          <img src="/img/Mascote.png?v=storely_1" alt="Storely Loading..." fetchpriority="high" />
        </div>
        <div class="brand-text">
          <h1 class="name">Storely</h1>
        </div>
                <div class="loader-wrapper">
          <div class="loader-line"></div>
        </div>
        
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function () {
        // 1. Limpeza de Service Workers antigos em ambiente Local (evita bugs de "portas partilhadas")
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (let registration of registrations) {
                registration.unregister();
              }
            });
          }
          // Limpa caches de armazenamento local se o projeto na mesma porta tiver mudado
          if(sessionStorage.getItem('last_project') !== 'storely') {
            sessionStorage.clear();
            sessionStorage.setItem('last_project', 'storely');
          }
        }

        // 2. Lógica de remoção otimizada do Splash Screen
        const splash = document.getElementById('app-splash');
        const body = document.body;

        window.addEventListener('load', () => {
          // Pequeno atraso para garantir que o React fez o mount
          setTimeout(() => {
            if (splash) {
              splash.classList.add('exit-active');
            }
            body.classList.remove('is-loading');

            // Liberta a RAM removendo os nós completamente do DOM em vez de apenas esconder
            setTimeout(() => {
              if (splash) {
                splash.innerHTML = ''; // Limpa os filhos primeiro
                splash.remove();       // Remove o container
              }
            }, 450); // Tempo igual ao da transição CSS (0.4s) + margem
          }, 800);
        });
      })();
    </script>
  </body>
</html>
